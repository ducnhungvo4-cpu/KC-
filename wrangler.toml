name = "canvans"
main = "./worker/index.js"
compatibility_date = "2026-05-28"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[vars]
SEEDREAM_BASE_URL = "https://ark.cn-beijing.volces.com/api/v3"
SEEDREAM_MODEL_ID = "doubao-seedream-5-0-260128"
SEEDREAM_IMAGE_ENDPOINT = "/images/generations"
SEEDREAM_SIZE = "2K"
SEEDREAM_WATERMARK = "true"
QWEN_EDIT_BASE_URL = "https://dashscope.aliyuncs.com/api/v1"
QWEN_EDIT_ENDPOINT = "/services/aigc/multimodal-generation/generation"
QWEN_EDIT_MODEL = "qwen-image-edit-plus-2025-12-15"
QWEN_EDIT_WATERMARK = "true"

# Seedance video — Volcengine Ark / doubao-seedance (PRIMARY, non-secret config).
# API key is set separately as a secret:
#   npx wrangler secret put SEEDANCE_API_KEY
SEEDANCE_BASE_URL = "https://ark.cn-beijing.volces.com"
SEEDANCE_MODEL_ID = "doubao-seedance-1-5-pro-251215"
SEEDANCE_CREATE_ENDPOINT = "/api/v3/contents/generations/tasks"
SEEDANCE_QUERY_ENDPOINT = "/api/v3/contents/generations/tasks"
# SEEDANCE_WATERMARK = "false"

# Agnes Video V2.0 (fallback, used only if SEEDANCE_API_KEY is unset). API key is a secret:
#   AGNES_VIDEO_API_KEY  (npx wrangler secret put AGNES_VIDEO_API_KEY)
AGNES_VIDEO_BASE_URL = "https://apihub.agnes-ai.com"
AGNES_VIDEO_MODEL_ID = "agnes-video-v2.0"
AGNES_VIDEO_CREATE_ENDPOINT = "/v1/videos"
AGNES_VIDEO_QUERY_ENDPOINT = "/v1/videos"
AGNES_VIDEO_FPS = "24"
AGNES_VIDEO_POLL_INTERVAL_MS = "6000"
AGNES_VIDEO_TIMEOUT_MS = "270000"

# Local image-to-video needs a public image URL for Agnes to fetch.
# Create an R2 bucket and uncomment this binding for stable production uploads:
#   npx wrangler r2 bucket create kc-canvas-media
#
# [[r2_buckets]]
# binding = "MEDIA_BUCKET"
# bucket_name = "kc-canvas-media"
